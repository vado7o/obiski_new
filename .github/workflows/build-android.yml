name: Android Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean and Install Dependencies
        run: |
          cd mobile
          # Удаляем старый файл блокировки, который ломает npm install
          rm -f package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps --no-audit --no-fund

      - name: Generate Local Android Folder
        run: |
          cd mobile
          # Убрали флаг --clear, который вызывал ошибку синтаксиса
          npx expo prebuild --platform android --no-install

      - name: Build APK with Gradle
        run: |
          cd mobile/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

