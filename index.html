<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#7C4DFF" />
    <title>Obiski</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%237C4DFF'/><stop offset='1' stop-color='%23FF6D00'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text y='.85em' x='.1em' font-size='78'>📖</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      #pre-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: linear-gradient(160deg, #EDE7FF 0%, #F8F6FF 100%);
        font-family: 'Nunito', sans-serif;
        z-index: 9999;
      }
      #pre-loader .pl-emoji {
        font-size: 56px;
        line-height: 1;
        animation: pl-bounce 1.2s ease-in-out infinite;
      }
      #pre-loader .pl-title {
        font-size: 2rem;
        font-weight: 900;
        background: linear-gradient(90deg, #7C4DFF, #FF6D00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.02em;
      }
      #pre-loader .pl-spinner {
        width: 36px;
        height: 36px;
        border: 4px solid #E8E0FF;
        border-top-color: #7C4DFF;
        border-radius: 50%;
        animation: pl-spin 0.8s linear infinite;
      }
      @keyframes pl-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes pl-bounce {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-10px); }
      }
    </style>
  </head>
  <body>
    <div id="pre-loader">
      <div class="pl-emoji">📖</div>
      <div class="pl-title">Obiski</div>
      <div class="pl-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
